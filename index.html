<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>USTA CAD v12 | Industrial Beast Edition</title>
    <style>
        :root { --main: #007acc; --bg: #0d0d0d; --panel: #1a1a1a; --border: #333; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ccc; display: flex; height: 100vh; }
        
        /* Panel Tasarımı */
        #sidebar { width: 360px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        .header { padding: 25px; background: #222; border-bottom: 2px solid var(--main); text-align: center; }
        .scroll { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        h3 { font-size: 0.8rem; color: var(--main); text-transform: uppercase; margin: 20px 0 10px 0; border-left: 3px solid var(--main); padding-left: 10px; }
        select, input { width: 100%; background: #252525; border: 1px solid #444; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box; }
        
        /* Butonlar */
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-main { background: var(--main); color: white; }
        .btn-add { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Viewport */
        #viewport { flex-grow: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; }

        /* Teknik Bilgi Ekranı */
        #overlay { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 1px solid var(--main); backdrop-filter: blur(5px); }
        .bom-item { font-family: monospace; font-size: 0.8rem; margin-bottom: 5px; color: #4ec9b0; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="header">
        <h2 style="margin:0">USTA CAD <span style="color:var(--main)">V12</span></h2>
        <small style="color:#777">Industrial Engineering Suite</small>
    </div>

    <div class="scroll">
        <h3>📂 KATALOG & MARKA</h3>
        <select id="brand" onchange="rebuildAll()">
            <option value="Schuco">Schüco - AWS 75.SI</option>
            <option value="Asas" selected>Asaş - RS 55</option>
            <option value="Saray">Saray - S60</option>
            <option value="Reynaers">Reynaers - MasterLine 8</option>
        </select>

        <h3>🎨 YÜZEY BİTİŞİ</h3>
        <select id="materialType" onchange="rebuildAll()">
            <option value="RAL7016">7016 Antrasit (Mat)</option>
            <option value="ELOKSAL">Natural Eloksal (Metalik)</option>
            <option value="RAL9016">9016 Beyaz (Parlak)</option>
        </select>

        <h3>📐 KASA ÖLÇÜLERİ (mm)</h3>
        <div style="display:flex; gap:10px">
            <input type="number" id="W" value="1200" oninput="rebuildAll()">
            <input type="number" id="H" value="1500" oninput="rebuildAll()">
        </div>

        <h3>➕ KAYIT / BÖLME EKLE</h3>
        <button class="btn btn-add" onclick="addMullion('V')">Dikey Kayıt Ekle (V)</button>
        <button class="btn btn-add" onclick="addMullion('H')">Yatay Kayıt Ekle (H)</button>

        <h3>🏢 PROJE YÖNETİMİ</h3>
        <button class="btn btn-main" onclick="exportData()">Teknik Veri PDF Al</button>
        <button class="btn btn-danger" onclick="clearProject()">Projeyi Sıfırla</button>
    </div>
</aside>

<main id="viewport">
    <div id="overlay">
        <h4 style="margin:0 0 10px 0; color:var(--main)">ÜRETİM RAPORU</h4>
        <div id="bomList"></div>
    </div>
    <canvas id="mainCanvas"></canvas>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, activeObject;
    let mullions = []; // Orta kayıtların listesi

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 1, 15000);
        camera.position.set(1500, 1500, 3000);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('mainCanvas'), antialias: true });
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.shadowMap.enabled = true;

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Işıklar
        const sun = new THREE.DirectionalLight(0xffffff, 1.8);
        sun.position.set(2000, 3000, 1500);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        rebuildAll();
        animate();
    }

    // --- PROFİL KESİT MOTORU ---
    function getProfileShape(type) {
        const shape = new THREE.Shape();
        const d = 55; // Kasa derinliği
        const t = 5;  // Tırnak genişliği
        
        // Gerçek alüminyum profil kesiti (L ve T birleşimi)
        shape.moveTo(0, 0);
        shape.lineTo(d, 0);
        shape.lineTo(d, d);
        shape.lineTo(d-t, d);
        shape.lineTo(d-t, t);
        shape.lineTo(0, t);
        shape.lineTo(0, 0);
        
        return shape;
    }

    function getTechnicalMaterial() {
        const mat = document.getElementById('materialType').value;
        const props = { metalness: 0.9, roughness: 0.2, clearcoat: 0.5 };
        
        if(mat === "RAL7016") return new THREE.MeshPhysicalMaterial({ color: 0x2c3e50, roughness: 0.8, metalness: 0.2 });
        if(mat === "ELOKSAL") return new THREE.MeshPhysicalMaterial({ color: 0x888888, metalness: 1, roughness: 0.1 });
        return new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, clearcoat: 1 });
    }

    function rebuildAll() {
        if(activeObject) scene.remove(activeObject);
        activeObject = new THREE.Group();

        const W = parseFloat(document.getElementById('W').value);
        const H = parseFloat(document.getElementById('H').value);
        const D = 55; 
        const mat = getTechnicalMaterial();

        // Kasa Profillerini Oluştur
        const buildFrame = (len, rotZ, px, py, pz) => {
            const settings = { depth: len, bevelEnabled: false };
            const geo = new THREE.ExtrudeGeometry(getProfileShape(), settings);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.set(0, 0, rotZ);
            mesh.position.set(px, py, pz);
            mesh.castShadow = true;
            activeObject.add(mesh);
        };

        // Kasa Dört Köşe
        buildFrame(W, 0, -W/2, H/2, -D/2); // Üst
        buildFrame(W, Math.PI, W/2, -H/2, D/2); // Alt
        buildFrame(H, -Math.PI/2, -W/2, -H/2, -D/2); // Sol
        buildFrame(H, Math.PI/2, W/2, H/2, -D/2); // Sağ

        // Orta Kayıtlar
        mullions.forEach(m => {
            if(m.type === 'V') {
                const mMesh = new THREE.Mesh(new THREE.BoxGeometry(D, H-D, D), mat);
                mMesh.position.set(m.pos, 0, 0);
                activeObject.add(mMesh);
            } else {
                const mMesh = new THREE.Mesh(new THREE.BoxGeometry(W-D, D, D), mat);
                mMesh.position.set(0, m.pos, 0);
                activeObject.add(mMesh);
            }
        });

        // Isıcam (Ultra Realism)
        const glassMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x111111, transparent: true, opacity: 0.3, transmission: 0.9, thickness: 5, ior: 1.5 
        });
        const glass = new THREE.Mesh(new THREE.BoxGeometry(W-10, H-10, 24), glassMat);
        activeObject.add(glass);

        scene.add(activeObject);
        updateBOM(W, H);
    }

    function addMullion(type) {
        const pos = prompt(`${type === 'V' ? 'Yatay' : 'Dikey'} eksendeki konumu girin (mm):`, "0");
        if(pos !== null) {
            mullions.push({ type, pos: parseFloat(pos) });
            rebuildAll();
        }
    }

    function updateBOM(w, h) {
        const list = document.getElementById('bomList');
        let html = `
            <div class="bom-item">POZ 101: KASA (H) - ${w}mm x 2</div>
            <div class="bom-item">POZ 102: KASA (V) - ${h}mm x 2</div>
        `;
        mullions.forEach((m, i) => {
            html += `<div class="bom-item">POZ 20${i}: KAYIT (${m.type}) - ${m.pos}mm</div>`;
        });
        list.innerHTML = html;
    }

    function clearProject() {
        mullions = [];
        rebuildAll();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
