<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta CAD v9.0 | LogiKal Technical Simulation</title>
    <style>
        :root { --sidebar-bg: #1e1e1e; --main-bg: #2d2d2d; --accent: #007acc; --border: #3c3c3c; --text: #cccccc; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma; background: var(--main-bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sol Menü - Orgadata Stili */
        #sidebar { width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .menu-header { padding: 15px; background: #252526; font-weight: bold; border-bottom: 1px solid var(--border); color: var(--accent); }
        .settings-box { padding: 20px; flex-grow: 1; overflow-y: auto; }
        
        label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        select, input { width: 100%; background: #3c3c3c; border: 1px solid #555; color: white; padding: 8px; margin-bottom: 15px; border-radius: 2px; }
        
        /* Sağ Alan */
        #workspace { flex-grow: 1; display: flex; flex-direction: column; }
        .toolbar { height: 40px; background: #333333; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        .view-area { flex-grow: 1; position: relative; cursor: crosshair; }
        
        /* Üretim Raporu Alt Panel */
        #report-panel { height: 200px; background: #1e1e1e; border-top: 2px solid var(--accent); padding: 15px; font-family: 'Consolas', monospace; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; color: var(--accent); border-bottom: 1px solid #333; padding: 5px; }
        td { padding: 5px; border-bottom: 1px solid #252526; }
        
        .status-bar { height: 25px; background: var(--accent); color: white; font-size: 0.7rem; display: flex; align-items: center; padding: 0 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="menu-header">PROJE YÖNETİMİ</div>
    <div class="settings-box">
        <label>Sistem Firması</label>
        <select id="firma">
            <option>ASAŞ ALÜMİNYUM</option>
            <option>SARAY SİSTEM</option>
            <option>YAVUZ ALÜMİNYUM</option>
        </select>

        <label>Seri Seçimi</label>
        <select id="seri" onchange="updateEngine()">
            <option value="55">LS 55 (Isı Yalıtımlı)</option>
            <option value="60">C 60 (Standart)</option>
            <option value="45">ALDOKS (Ekonomik)</option>
        </select>

        <label>Genişlik (mm)</label>
        <input type="number" id="W" value="1000" step="10" oninput="updateEngine()">
        
        <label>Yükseklik (mm)</label>
        <input type="number" id="H" value="2000" step="10" oninput="updateEngine()">

        <label>Renk Kodu (RAL)</label>
        <input type="text" id="ral" value="7016" oninput="updateEngine()">

        <label>Cam Kombinasyonu</label>
        <select id="cam">
            <option>4mm + 16mm + 4mm</option>
            <option>6mm + 12mm + 6mm</option>
            <option>5mm + 10mm + 5mm</option>
        </select>
    </div>
</div>

<div id="workspace">
    <div class="toolbar">
        <button onclick="setView('2d')">2D Çizim</button>
        <button onclick="setView('3d')">3D Model</button>
        <span id="coord">X: 0, Y: 0</span>
    </div>
    <div class="view-area" id="viewArea">
        <canvas id="mainCanvas"></canvas>
    </div>
    <div id="report-panel">
        <table>
            <thead>
                <tr>
                    <th>Poz</th>
                    <th>Açıklama</th>
                    <th>Adet</th>
                    <th>Kesim Ölçüsü</th>
                    <th>Açı</th>
                </tr>
            </thead>
            <tbody id="bomBody">
                </tbody>
        </table>
    </div>
    <div class="status-bar">Hazır | Ölçü Birimi: mm | Kesim Hassasiyeti: +/- 0.1mm</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let mode = '3d';
    let scene, camera, renderer, controls, currentMesh;

    function init() {
        // Three.js Kurulumu
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2d2d2d);
        
        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 300) / window.innerHeight, 1, 5000);
        camera.position.set(500, 500, 1000);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('mainCanvas'), antialias: true });
        renderer.setSize(window.innerWidth - 300, window.innerHeight - 265);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        const light = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(light);
        
        updateEngine();
        animate();
    }

    function setView(v) { mode = v; updateEngine(); }

    function updateEngine() {
        const w = parseFloat(document.getElementById('W').value);
        const h = parseFloat(document.getElementById('H').value);
        const seri = parseFloat(document.getElementById('seri').value);
        
        if(currentMesh) scene.remove(currentMesh);
        
        // 3D Profil Grubu oluşturma
        currentMesh = new THREE.Group();
        const material = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });

        // Basitçe 45 derece birleşim simülasyonu
        const createProfile = (len, isH) => {
            const geo = new THREE.BoxGeometry(isH ? len : seri, isH ? seri : len, 40);
            return new THREE.Mesh(geo, material);
        };

        const top = createProfile(w, true); top.position.y = h/2;
        const bot = createProfile(w, true); bot.position.y = -h/2;
        const left = createProfile(h, false); left.position.x = -w/2;
        const right = createProfile(h, false); right.position.x = w/2;

        currentMesh.add(top, bot, left, right);
        scene.add(currentMesh);

        // Kesim Listesi (BOM) Güncelleme
        const bom = [
            {poz: "101", aciklama: "Kasa Profili (Yatay)", adet: 2, olcu: w + " mm", aci: "45° / 45°"},
            {poz: "102", aciklama: "Kasa Profili (Dikey)", adet: 2, olcu: h + " mm", aci: "45° / 45°"},
            {poz: "501", aciklama: "EPDM Dış Cam Fitili", adet: 1, olcu: ((w*2+h*2)/1000).toFixed(2) + " mt", aci: "-"},
            {poz: "901", aciklama: "Isıcam Ünitesi", adet: 1, olcu: (w-seri*2) + "x" + (h-seri*2) + " mm", aci: "-"}
        ];

        let html = "";
        bom.forEach(item => {
            html += `<tr><td>${item.poz}</td><td>${item.aciklama}</td><td>${item.adet}</td><td>${item.olcu}</td><td>${item.aci}</td></tr>`;
        });
        document.getElementById('bomBody').innerHTML = html;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
