<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta CAD v8.0 | Profesyonel Alüminyum Tasarım</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; height: 100vh; }
        #ui-panel { width: 320px; background: #1e293b; padding: 20px; border-right: 2px solid #3b82f6; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #canvas-container { flex-grow: 1; position: relative; }
        .control-group { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-bottom: 3px solid #3b82f6; }
        h3 { margin-top: 0; color: #3b82f6; font-size: 1rem; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #10b981; color: white; }
        .btn-del { background: #ef4444; color: white; }
        .info-card { position: absolute; top: 20px; right: 20px; background: rgba(15, 23, 42, 0.9); padding: 15px; border-radius: 8px; border: 1px solid #3b82f6; }
        .kesim-listesi { font-family: monospace; font-size: 0.8rem; color: #fbbf24; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>🛠️ USTA CAD PRO</h2>
    <p style="font-size: 0.8rem; color: #94a3b8;">Orgadata Gelişmiş Tasarım Modülü</p>

    <div class="control-group">
        <h3>📦 YENİ EKLE</h3>
        <button class="btn-add" onclick="addNewWindow()">+ Yeni Doğrama Ekle</button>
        <p style="font-size: 0.7rem;">(Tinkercad gibi sahnede taşıyabilirsin)</p>
    </div>

    <div class="control-group">
        <h3>📐 ÖLÇÜLER (Seçili Ürün)</h3>
        <label>Genişlik (cm)</label>
        <input type="number" id="inpW" value="120" oninput="updateSelected()">
        <label>Yükseklik (cm)</label>
        <input type="number" id="inpH" value="150" oninput="updateSelected()">
    </div>

    <div class="control-group">
        <h3>⚙️ SİSTEM AYARI</h3>
        <select id="inpSeri" onchange="updateSelected()">
            <option value="5.5">ASAŞ LS 55</option>
            <option value="6.0">SARAY C60</option>
            <option value="4.5">ALDOKS</option>
        </select>
        <input type="color" id="inpColor" value="#3b82f6" style="height:40px;" oninput="updateSelected()">
    </div>

    <button class="btn-del" onclick="deleteSelected()">Seçiliyi Sil</button>
</div>

<div id="canvas-container">
    <div class="info-card">
        <h3>📝 KESİM RAPORU</h3>
        <div id="report" class="kesim-listesi">Ürün seçin...</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>

<script>
    let scene, camera, renderer, orbit, dragControls;
    let windowObjects = [];
    let selectedObject = null;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);
        
        // Izgara (Grid) - Tinkercad gibi
        const grid = new THREE.GridHelper(2000, 50, 0x334155, 0x1e293b);
        scene.add(grid);

        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 1, 5000);
        camera.position.set(500, 500, 800);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 320, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.mouseButtons = { ORBIT: THREE.MOUSE.RIGHT, ZOOM: THREE.MOUSE.MIDDLE, PAN: THREE.MOUSE.LEFT };

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(500, 1000, 500);
        scene.add(sun);

        addNewWindow(); // Başlangıçta bir tane ekle
        animate();
    }

    function createPart(len, gen, color) {
        const shape = new THREE.Shape();
        shape.moveTo(0, 0);
        shape.lineTo(len, 0);
        shape.lineTo(len - gen, gen);
        shape.lineTo(gen, gen);
        shape.lineTo(0, 0);

        const extSettings = { depth: 6, bevelEnabled: false };
        const geo = new THREE.ExtrudeGeometry(shape, extSettings);
        const mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.6, roughness: 0.2 });
        return new THREE.Mesh(geo, mat);
    }

    function addNewWindow() {
        const group = new THREE.Group();
        group.userData = { w: 120, h: 150, seri: 5.5, color: "#3b82f6" };
        
        rebuildWindow(group);
        group.position.set(Math.random()*200 - 100, 75, Math.random()*200 - 100);
        
        scene.add(group);
        windowObjects.push(group);
        setupDrag();
        selectObject(group);
    }

    function rebuildWindow(group) {
        while(group.children.length > 0) group.remove(group.children[0]);
        
        const { w, h, seri, color } = group.userData;

        const ust = createPart(w, seri, color);
        ust.position.set(-w/2, h/2, 0);

        const alt = createPart(w, seri, color);
        alt.rotation.z = Math.PI;
        alt.position.set(w/2, -h/2, 6);

        const sol = createPart(h, seri, color);
        sol.rotation.z = Math.PI / 2;
        sol.position.set(-w/2, -h/2, 6);

        const sag = createPart(h, seri, color);
        sag.rotation.z = -Math.PI / 2;
        sag.position.set(w/2, h/2, 0);

        group.add(ust, alt, sol, sag);
    }

    function setupDrag() {
        if(dragControls) dragControls.dispose();
        dragControls = new THREE.DragControls(windowObjects, camera, renderer.domElement);
        dragControls.addEventListener('dragstart', (e) => {
            orbit.enabled = false;
            selectObject(e.object.parent || e.object);
        });
        dragControls.addEventListener('dragend', () => orbit.enabled = true);
    }

    function selectObject(obj) {
        selectedObject = obj;
        const d = obj.userData;
        document.getElementById('inpW').value = d.w;
        document.getElementById('inpH').value = d.h;
        document.getElementById('inpSeri').value = d.seri;
        document.getElementById('inpColor').value = d.color;
        updateReport();
    }

    function updateSelected() {
        if(!selectedObject) return;
        selectedObject.userData.w = parseFloat(document.getElementById('inpW').value);
        selectedObject.userData.h = parseFloat(document.getElementById('inpH').value);
        selectedObject.userData.seri = parseFloat(document.getElementById('inpSeri').value);
        selectedObject.userData.color = document.getElementById('inpColor').value;
        rebuildWindow(selectedObject);
        updateReport();
    }

    function updateReport() {
        if(!selectedObject) return;
        const { w, h, seri } = selectedObject.userData;
        document.getElementById('report').innerHTML = `
            ÜST/ALT: 2 ADET x ${w} cm (45°)<br>
            YANLAR : 2 ADET x ${h} cm (45°)<br>
            NET CAM: ${(w - (seri*2)).toFixed(1)} x ${(h - (seri*2)).toFixed(1)} cm
        `;
    }

    function deleteSelected() {
        if(!selectedObject) return;
        scene.remove(selectedObject);
        windowObjects = windowObjects.filter(o => o !== selectedObject);
        selectedObject = null;
        setupDrag();
    }

    function animate() {
        requestAnimationFrame(animate);
        orbit.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
