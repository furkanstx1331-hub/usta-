<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta 3D v7.0 | 45 Derece Gönye & Serbest Taşıma</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #111; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #222; padding: 20px; border-right: 2px solid #e67e22; z-index: 10; }
        #render-container { flex-grow: 1; position: relative; }
        h2 { color: #e67e22; font-size: 1.1rem; text-align: center; }
        .hint { font-size: 0.75rem; color: #777; margin-top: 10px; line-height: 1.4; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }
        .fiyat-box { margin-top: 20px; padding: 15px; background: #2e7d32; border-radius: 8px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>🛠️ USTA 3D PRO v7.0</h2>
    
    <label>📖 Profil Serisi</label>
    <select id="seri" onchange="olcuGuncelle()">
        <option value="5.5">LS 55 (5.5cm Genişlik)</option>
        <option value="6.0">C60 (6.0cm Genişlik)</option>
        <option value="4.5">Aldoks (4.5cm Genişlik)</option>
    </select>

    <label>📏 Genişlik (cm)</label>
    <input type="number" id="w" value="120" oninput="olcuGuncelle()">

    <label>📏 Yükseklik (cm)</label>
    <input type="number" id="h" value="150" oninput="olcuGuncelle()">

    <label>🎨 Profil Rengi</label>
    <input type="color" id="renk" value="#34495e" oninput="olcuGuncelle()">

    <div class="fiyat-box" id="fiyatDisplay">Teklif: 4.500 TL</div>

    <div class="hint">
        <b>Kontroller:</b><br>
        • <b>Sol Tık:</b> Objeyi sürükle (Tinkercad modu)<br>
        • <b>Sağ Tık:</b> Kamerayı döndür<br>
        • <b>Tekerlek:</b> Yakınlaş / Uzaklaş
    </div>
</div>

<div id="render-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>

<script>
    let scene, camera, renderer, orbit, dragControls, frameGroup;
    const objects = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 300) / window.innerHeight, 1, 2000);
        camera.position.set(300, 300, 500);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 300, window.innerHeight);
        document.getElementById('render-container').appendChild(renderer.domElement);

        // Kamera Kontrolü (Sağ Tık ile Dönüş)
        orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.mouseButtons = { ORBIT: THREE.MOUSE.RIGHT, ZOOM: THREE.MOUSE.MIDDLE, PAN: THREE.MOUSE.LEFT };
        orbit.enableDamping = true;

        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(100, 200, 100);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        olcuGuncelle();
        animate();
    }

    function createGonyeliProfil(uzunluk, gen, renk, yatayMi) {
        const shape = new THREE.Shape();
        // 45 derece kesim için yamuk çizimi
        const kesit = gen; 
        shape.moveTo(0, 0);
        shape.lineTo(uzunluk, 0);
        shape.lineTo(uzunluk - kesit, kesit);
        shape.lineTo(kesit, kesit);
        shape.lineTo(0, 0);

        const settings = { depth: 5, bevelEnabled: false };
        const geometry = new THREE.ExtrudeGeometry(shape, settings);
        const material = new THREE.MeshStandardMaterial({ color: renk, metalness: 0.7, roughness: 0.3 });
        const mesh = new THREE.Mesh(geometry, material);
        
        return mesh;
    }

    function olcuGuncelle() {
        if(frameGroup) scene.remove(frameGroup);
        frameGroup = new THREE.Group();
        
        const W = parseFloat(document.getElementById('w').value);
        const H = parseFloat(document.getElementById('h').value);
        const GEN = parseFloat(document.getElementById('seri').value);
        const RENK = document.getElementById('renk').value;

        // Üst Profil
        const ust = createGonyeliProfil(W, GEN, RENK);
        ust.position.set(-W/2, H/2, 0);
        
        // Alt Profil
        const alt = createGonyeliProfil(W, GEN, RENK);
        alt.rotation.z = Math.PI;
        alt.position.set(W/2, -H/2, 5);

        // Sol Profil
        const sol = createGonyeliProfil(H, GEN, RENK);
        sol.rotation.z = Math.PI / 2;
        sol.position.set(-W/2, -H/2, 5);

        // Sağ Profil
        const sag = createGonyeliProfil(H, GEN, RENK);
        sag.rotation.z = -Math.PI / 2;
        sag.position.set(W/2, H/2, 0);

        frameGroup.add(ust, alt, sol, sag);
        scene.add(frameGroup);

        // Sürükleme Kontrolü
        if(dragControls) dragControls.dispose();
        dragControls = new THREE.DragControls([frameGroup], camera, renderer.domElement);
        
        dragControls.addEventListener('dragstart', () => orbit.enabled = false);
        dragControls.addEventListener('dragend', () => orbit.enabled = true);

        // Fiyat Güncelle (Temsili)
        document.getElementById('fiyatDisplay').innerText = `Teklif: ${(W*H/10).toLocaleString()} TL`;
    }

    function animate() {
        requestAnimationFrame(animate);
        orbit.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
