<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>USTA CAD v11 | Global Catalog & Photorealistic Render</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --blue: #007acc; --gold: #d4af37; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sol Panel: Katalog ve Kontrol */
        #sidebar { width: 340px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; overflow-y: auto; z-index: 100; }
        .brand-header { padding: 20px; background: #222; text-align: center; border-bottom: 2px solid var(--blue); }
        .section { padding: 15px; border-bottom: 1px solid #222; }
        h4 { font-size: 0.7rem; color: var(--blue); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }

        select, input { width: 100%; background: #252525; border: 1px solid #444; color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 0.9rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Sağ Panel: Viewport */
        #viewport { flex-grow: 1; position: relative; }
        #renderCanvas { width: 100%; height: 100%; }

        /* Teknik Detay Kartı */
        #data-overlay { position: absolute; bottom: 20px; left: 360px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; border-left: 4px solid var(--gold); min-width: 250px; backdrop-filter: blur(10px); }
        .price { font-size: 1.8rem; color: #44ff44; font-weight: bold; font-family: monospace; }
        .badge { display: inline-block; padding: 3px 8px; background: var(--blue); font-size: 0.6rem; border-radius: 3px; margin-bottom: 10px; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="brand-header">
        <h2 style="margin:0; font-size:1.2rem; color:var(--blue)">USTA PRO MAX</h2>
        <small style="color:#666">Industrial CAD Engine v11.0</small>
    </div>

    <div class="section">
        <h4>📦 SİSTEM KATALOĞU</h4>
        <label style="font-size:0.7rem">SİSTEM SEÇİMİ</label>
        <select id="sysSelect" onchange="updateSystem()">
            <optgroup label="ALMANYA (Premium)">
                <option value="AWS75" data-depth="75" data-brand="Schüco">Schüco AWS 75.SI</option>
                <option value="ML8" data-depth="77" data-brand="Reynaers">Reynaers MasterLine 8</option>
            </optgroup>
            <optgroup label="TÜRKİYE (Yerli Devler)">
                <option value="RS55" data-depth="55" data-brand="Asaş">Asaş Rescara RS 55</option>
                <option value="S60" data-depth="60" data-brand="Saray">Saray S60 Yalıtımlı</option>
                <option value="C60" data-depth="60" data-brand="Yerli">C60 Standart</option>
            </optgroup>
        </select>

        <label style="font-size:0.7rem">YÜZEY TİPİ (TEXTURE)</label>
        <select id="matSelect" onchange="updateSystem()">
            <option value="anodized">Eloksallı Gri (Metalik)</option>
            <option value="anthracite">RAL 7016 (Pütürlü Mat)</option>
            <option value="white">RAL 9016 (Parlak Lake)</option>
            <option value="gold">Bronz / Gold (Özel)</option>
        </select>
    </div>

    <div class="section">
        <h4>📐 GEOMETRİ (mm)</h4>
        <div class="stat-grid">
            <div><label style="font-size:0.7rem">GENİŞLİK</label><input type="number" id="wInp" value="1200" oninput="updateSystem()"></div>
            <div><label style="font-size:0.7rem">YÜKSEKLİK</label><input type="number" id="hInp" value="1800" oninput="updateSystem()"></div>
        </div>
    </div>

    <div class="section">
        <h4>🧊 CAM ÜNİTESİ</h4>
        <select id="glassSelect" onchange="updateSystem()">
            <option value="24">4 + 16 + 4 (Standart)</option>
            <option value="32">4+12+4+12 (Üçlü Cam)</option>
            <option value="10">10mm Lamine (Akustik)</option>
        </select>
    </div>

    <div style="padding:20px; font-size:0.7rem; color:#555">
        * Tüm çizimler 45° gönye kesim ve EPDM fitil payları dahil hesaplanmaktadır.
    </div>
</aside>

<main id="viewport">
    <canvas id="renderCanvas"></canvas>
    <div id="data-overlay">
        <div class="badge" id="brandTag">ASAS RS55</div>
        <div style="font-size:0.7rem; color:#aaa">TOPLAM TEKLİF (KDV DAHİL)</div>
        <div class="price" id="priceTag">0.00 TL</div>
        <div id="dimTag" style="font-size:0.8rem; margin-top:10px; color:#ccc">1200 x 1800 mm</div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, windowGroup;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 340) / window.innerHeight, 1, 10000);
        camera.position.set(1500, 1500, 2500);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('renderCanvas'), antialias: true });
        renderer.setSize(window.innerWidth - 340, window.innerHeight);
        
        // --- REALISM ENGINE SETTINGS ---
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Işıklandırma (Stüdyo Kalitesi)
        const light1 = new THREE.DirectionalLight(0xffffff, 2);
        light1.position.set(1000, 2000, 1000);
        light1.castShadow = true;
        scene.add(light1);

        const light2 = new THREE.PointLight(0x007acc, 1);
        light2.position.set(-1000, 500, 1000);
        scene.add(light2);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        updateSystem();
        animate();
    }

    function getMaterial() {
        const type = document.getElementById('matSelect').value;
        let props = { metalness: 1, roughness: 0.2 };

        switch(type) {
            case 'anodized': return new THREE.MeshPhysicalMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.1, clearcoat: 0.2 });
            case 'anthracite': return new THREE.MeshPhysicalMaterial({ color: 0x2c3e50, metalness: 0.3, roughness: 0.8 });
            case 'white': return new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.1, clearcoat: 1.0 });
            case 'gold': return new THREE.MeshPhysicalMaterial({ color: 0xaa8833, metalness: 1.0, roughness: 0.2, clearcoat: 0.5 });
        }
    }

    function updateSystem() {
        if(windowGroup) scene.remove(windowGroup);
        windowGroup = new THREE.Group();

        const w = parseFloat(document.getElementById('wInp').value);
        const h = parseFloat(document.getElementById('hInp').value);
        const sel = document.getElementById('sysSelect');
        const depth = parseFloat(sel.options[sel.selectedIndex].dataset.depth);
        const brand = sel.options[sel.selectedIndex].dataset.brand;
        const glassT = parseFloat(document.getElementById('glassSelect').value);

        const mat = getMaterial();

        // 45 Derece Gönye Profil Fonksiyonu
        const createProfile = (len, isH, x, y) => {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.lineTo(len, 0);
            shape.lineTo(len - depth, depth);
            shape.lineTo(depth, depth);
            shape.lineTo(0, 0);

            const geo = new THREE.ExtrudeGeometry(shape, { depth: depth, bevelEnabled: false });
            const mesh = new THREE.Mesh(geo, mat);
            
            if(isH) {
                mesh.position.set(-len/2, y, -depth/2);
            } else {
                mesh.rotation.z = Math.PI / 2;
                mesh.position.set(x, -len/2, -depth/2);
            }
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        };

        // Kasa Kurulumu
        windowGroup.add(createProfile(w, true, 0, h/2 - depth));
        windowGroup.add(createProfile(w, true, 0, -h/2));
        windowGroup.add(createProfile(h, false, -w/2 + depth, 0));
        windowGroup.add(createProfile(h, false, w/2, 0));

        // Ultra Gerçekçi Cam
        const glassGeo = new THREE.BoxGeometry(w - depth*2 + 10, h - depth*2 + 10, glassT);
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0x001111, transparent: true, opacity: 0.3,
            metalness: 0.9, roughness: 0.01, transmission: 0.9,
            thickness: 5, ior: 1.5
        });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        windowGroup.add(glass);

        scene.add(windowGroup);

        // UI GÜNCELLEME
        document.getElementById('brandTag').innerText = brand.toUpperCase() + " " + sel.value;
        document.getElementById('dimTag').innerText = `${w} x ${h} mm`;
        const total = ( (w+h)*2/1000 * 1500 + (w*h/1000000 * 3000) ).toFixed(2);
        document.getElementById('priceTag').innerText = total + " TL";
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
    window.onresize = () => {
        camera.aspect = (window.innerWidth - 340) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 340, window.innerHeight);
    };
</script>

</body>
</html>
