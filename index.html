<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Usta Yazılım v6.0 | Gerçek 3D Deneyimi</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: #252525; padding: 20px; border-right: 2px solid #e67e22; z-index: 10; overflow-y: auto; }
        #render-container { flex-grow: 1; position: relative; cursor: grab; }
        #render-container:active { cursor: grabbing; }
        h2 { color: #e67e22; text-align: center; font-size: 1.2rem; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #aaa; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .info-box { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; pointer-events: none; }
        .instruction { position: absolute; bottom: 20px; left: 340px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>🛠️ USTA 3D PRO v6.0</h2>
    
    <label>📖 KATALOG SEÇİMİ</label>
    <select id="seriSelect">
        <option value="1.5">ASAŞ LS 55 (Lüks)</option>
        <option value="1.2">C60 Standart</option>
        <option value="0.9">Aldoks Hafif</option>
    </select>

    <label>🎨 PROFİL RENGİ</label>
    <input type="color" id="renkSecici" value="#e67e22">

    <label>📏 GENİŞLİK (cm)</label>
    <input type="number" id="wInput" value="150">

    <label>📏 YÜKSEKLİK (cm)</label>
    <input type="number" id="hInput" value="200">

    <label>🧱 PROFİL ET KALINLIĞI (cm)</label>
    <input type="number" id="dInput" value="10">

    <hr style="margin: 20px 0; border: 0.5px solid #444;">
    
    <div id="fiyatEtiket" style="font-size: 1.2rem; color: #4cd137; font-weight: bold; text-align: center;">---</div>
</div>

<div id="render-container" id="3d-view">
    <div class="info-box">
        <div id="m2Detay">Ölçü: 150x200 cm</div>
        <div id="markaDetay">Seri: LS 55</div>
    </div>
    <div class="instruction">Fare ile döndür | Tekerlek ile yakınlaş | Sağ tık ile kaydır</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, frame;

    function init3D() {
        // 1. Sahne Oluşturma
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // 2. Kamera Ayarı
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 320) / window.innerHeight, 0.1, 1000);
        camera.position.set(200, 200, 300);

        // 3. Renderer (Çizici)
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 320, window.innerHeight);
        document.getElementById('render-container').appendChild(renderer.domElement);

        // 4. Orbit Controls (Fare ile döndürme)
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 5. Işıklandırma
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        createFrame();
        animate();
    }

    function createFrame() {
        if(frame) scene.remove(frame);
        
        const w = parseFloat(document.getElementById('wInput').value);
        const h = parseFloat(document.getElementById('hInput').value);
        const d = parseFloat(document.getElementById('dInput').value); // Derinlik
        const color = document.getElementById('renkSecici').value;
        const pKalinlik = 5; // Profilin kendi kalınlığı

        frame = new THREE.Group();

        const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.8 });

        // Parçaları Oluştur (Alt, Üst, Sol, Sağ)
        const createPart = (pw, ph, pd, px, py, pz) => {
            const geo = new THREE.BoxGeometry(pw, ph, pd);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(px, py, pz);
            frame.add(mesh);
        };

        // Kasa Parçaları
        createPart(w, pKalinlik, d, 0, h/2, 0); // Üst
        createPart(w, pKalinlik, d, 0, -h/2, 0); // Alt
        createPart(pKalinlik, h, d, -w/2, 0, 0); // Sol
        createPart(pKalinlik, h, d, w/2, 0, 0); // Sağ

        // Cam Paneli (Yarı saydam)
        const glassGeo = new THREE.BoxGeometry(w - pKalinlik, h - pKalinlik, 1);
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.3 });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        frame.add(glass);

        scene.add(frame);

        // Fiyat ve Bilgi Güncelle
        document.getElementById('m2Detay').innerText = `Ölçü: ${w}x${h} cm`;
        const fiyat = (w*h/10000 * 2500 * document.getElementById('seriSelect').value).toFixed(2);
        document.getElementById('fiyatEtiket').innerText = `Teklif: ${fiyat} TL`;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // Inputları dinle
    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', createFrame);
    });

    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 320) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 320, window.innerHeight);
    });

    init3D();
</script>

</body>
</html>
